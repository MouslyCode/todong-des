events{}

http {

    upstream frontend {
        server frontend:80;
    }
    upstream backend {
        server backend1:8080;
        server backend2:8080;
        server backend3:8080;
    }

    server{
        listen 80;

        location /api {
            proxy_pass http://backend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
        location / {
            proxy_pass http://frontend;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}